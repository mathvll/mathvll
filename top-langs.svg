  <desc id="langsDesc">Card local temporario enquanto o workflow gera a versao automatica.</desc>
  <defs>
    <linearGradient id="langsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
  </defs>
  <rect width="704" height="392" rx="24" fill="url(#langsBg)" />
  <rect x="16" y="16" width="672" height="360" rx="22" fill="#0b1220" stroke="#1e293b" />
  <text x="32" y="56" fill="#f8fafc" font-size="30" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Top Langs</text>
  <text x="32" y="92" fill="#94a3b8" font-size="16" font-family="Segoe UI, Arial, sans-serif">Este card local substitui o provedor externo que estava em 503.</text>
  <text x="32" y="124" fill="#94a3b8" font-size="16" font-family="Segoe UI, Arial, sans-serif">Depois do workflow, ele passa a mostrar a distribuicao real das linguagens.</text>
