<svg xmlns="http://www.w3.org/2000/svg" width="704" height="376" viewBox="0 0 704 376" role="img" aria-labelledby="statsTitle statsDesc">
  <title id="statsTitle">Resumo da atividade</title>
  <desc id="statsDesc">Resumo visual de atividade no GitHub.</desc>
  <defs>
    <linearGradient id="statsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="55%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1e3a5f" />
    </linearGradient>
  </defs>
  <rect width="704" height="376" rx="18" fill="url(#statsBg)" />
  <rect x="14" y="14" width="676" height="348" rx="14" fill="#0b1220" stroke="#24324a" />
  <text x="32" y="56" fill="#f8fafc" font-size="30" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Resumo da atividade</text>
  <text x="32" y="88" fill="#94a3b8" font-size="16" font-family="Segoe UI, Arial, sans-serif">Indicadores gerais do perfil e dos repositorios.</text>
  <text x="32" y="164" fill="#93c5fd" font-size="16" font-family="Segoe UI, Arial, sans-serif">Atividade consolidada em repositorios, contribuicoes e interacoes publicas.</text>
</svg>
