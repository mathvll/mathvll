<svg xmlns="http://www.w3.org/2000/svg" width="704" height="392" viewBox="0 0 704 392" role="img" aria-labelledby="statsTitle statsDesc">
  <title id="statsTitle">GitHub Stats</title>
  <desc id="statsDesc">Card local temporario enquanto o workflow gera a versao automatica.</desc>
  <defs>
    <linearGradient id="statsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#172554" />
    </linearGradient>
  </defs>
  <rect width="704" height="392" rx="24" fill="url(#statsBg)" />
  <rect x="16" y="16" width="672" height="360" rx="22" fill="#0b1220" stroke="#1e293b" />
  <text x="32" y="56" fill="#f8fafc" font-size="30" font-weight="700" font-family="Segoe UI, Arial, sans-serif">GitHub Stats</text>
  <text x="32" y="92" fill="#94a3b8" font-size="16" font-family="Segoe UI, Arial, sans-serif">Este card agora e gerado dentro do repositorio.</text>
  <text x="32" y="124" fill="#94a3b8" font-size="16" font-family="Segoe UI, Arial, sans-serif">Execute o workflow para substituir este placeholder pelos dados reais.</text>
</svg>
