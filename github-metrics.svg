<svg xmlns="http://www.w3.org/2000/svg" width="900" height="640" viewBox="0 0 900 640" role="img" aria-labelledby="metricsTitle metricsDesc">
  <title id="metricsTitle">Detalhamento tecnico</title>
  <desc id="metricsDesc">Detalhamento visual de repositorios, contribuicoes, linguagens e organizacoes.</desc>
  <defs>
    <linearGradient id="metricsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="55%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1e3a5f" />
    </linearGradient>
  </defs>
  <rect width="900" height="640" rx="18" fill="url(#metricsBg)" />
  <rect x="14" y="14" width="872" height="612" rx="14" fill="#0b1220" stroke="#24324a" />
  <text x="40" y="58" fill="#f8fafc" font-size="32" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Detalhamento tecnico</text>
  <text x="40" y="90" fill="#94a3b8" font-size="16" font-family="Segoe UI, Arial, sans-serif">Visao consolidada de repositorios, contribuicoes, linguagens e organizacoes.</text>
  <rect x="40" y="130" width="820" height="380" rx="12" fill="#111827" stroke="#25324a" />
  <text x="70" y="194" fill="#93c5fd" font-size="16" font-family="Segoe UI, Arial, sans-serif">Repositorios, contribuicoes, linguagens e organizacoes em uma visao unica.</text>
  <text x="70" y="238" fill="#f8fafc" font-size="18" font-family="Segoe UI, Arial, sans-serif">Layout amplo para leitura direta no perfil, sem cortes no rodape.</text>
