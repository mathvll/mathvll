name: Gerar metricas do perfil

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validar token
        env:
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          if [ -z "$METRICS_TOKEN" ]; then
            echo "METRICS_TOKEN nao configurado"
            exit 1
          fi

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Gerar SVGs locais
        env:
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
          GITHUB_USERNAME: mathvll
        run: python scripts/generate_profile_cards.py

      - name: Commitar SVGs atualizados
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: atualiza cards de metricas do perfil"
          file_pattern: "github-stats.svg top-langs.svg github-metrics.svg"
